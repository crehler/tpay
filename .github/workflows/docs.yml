name: Docs (MkDocs)

# Build i publikacja dokumentacji MkDocs na GitHub Pages.
#
# Deploy działa wyłącznie na publicznym mirrorze produkcyjnym (crehler/tpay) —
# tam, gdzie GitHub Pages jest darmowe. Na prywatnym źródle workflow jest pomijany
# (guard poniżej). Uruchamia się przy każdym wydaniu (snapshot push -> master)
# oraz ręcznie. Wymaga: Pages włączone (Settings -> Pages -> Deploy from branch: gh-pages).
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

permissions:
  contents: write

jobs:
  deploy:
    if: github.repository == 'crehler/tpay'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install -r docs/requirements.txt

      - name: Build & deploy (gh-pages)
        run: mkdocs gh-deploy --force
