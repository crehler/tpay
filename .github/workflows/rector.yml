name: Rector downgrade guard

# Fail CI, jeśli do kodu wróci składnia PHP 8.3+ (typowane stałe klasowe,
# #[\Override] itp.). Plugin musi zostać parsowalny na PHP 8.2 — dolnej
# granicy wspieranej przez Shopware. Rector instalowany standalone, więc
# guard nie wymaga całego drzewa zależności Shopware.

on:
  pull_request:
  push:
    branches:
      - v6

permissions:
  contents: read

concurrency:
  group: rector-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Rector (standalone)
        run: |
          mkdir -p .rector-bin
          composer require rector/rector:^2.4 \
            --working-dir=.rector-bin --no-interaction --no-progress

      - name: Fail if PHP 8.3+ syntax is present
        run: php .rector-bin/vendor/bin/rector process --dry-run --no-progress-bar --config rector.php
