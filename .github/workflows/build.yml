name: Build & Release

# Buduje storefront + admin, tworzy ZIP i GitHub Release (FriendsOfShopware).
# FoS sam czyta wersję z composer.json, tworzy tag vx.x.x i Release — dlatego
# wyzwalacz to push na master mirrora (publish.yml force-pushuje tam kod),
# a NIE push tagu (FoS pominąłby release, gdyby tag już istniał).
#
# Uśpiony na repo źródłowym (guard niżej), aktywny tylko na mirrorze.
on:
  push:
    branches: [master]

jobs:
  build:
    # Nie uruchamiaj na repo źródłowym — tylko na mirrorze (-release / publiczny).
    if: github.repository != 'crehler-com/CrehlerTpayBundle'
    uses: FriendsOfShopware/actions/.github/workflows/github.yml@main
    with:
      extensionName: CrehlerTpay
      shopwareVersion: '6.7.0'
    secrets:
      ghToken: ${{ secrets.GITHUB_TOKEN }}
